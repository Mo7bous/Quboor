    function makeDefaultWeeklyPlan(data){const ids=['banque-alimentaire-bruxelles-brabant','colruyt-jette','colruyt-osseghem-molenbeek','colruyt-laeken','okay-jette','okay-ganshoren','aldi-saint-guidon','aldi-marius-renard','aldi-chaussee-de-mons'];const plan={};['lundi','mardi','mercredi','jeudi','vendredi','samedi','dimanche'].forEach(day=>plan[day]={enabled:true,points:ids.map(id=>({id,enabled:true}))});return plan;}

    function buildForecastHistory30Days(){const points=defaultPlaces.filter(p=>p.id!=='asbl').map(p=>p.name);const rows=[];const today=todayDateOnly();for(let i=30;i>=1;i--){const d=new Date(today);d.setDate(today.getDate()-i);points.forEach((point,idx)=>{const seed=i+idx;const isColruyt=point.toLowerCase().includes('colruyt');const isAldi=point.toLowerCase().includes('aldi');const A=isColruyt?2+(seed%3):1,B=isColruyt?2+(seed%2):1,C=1+(seed%3),D=1,F=isColruyt?0:(isAldi?2+(seed%3):1);rows.push({date:formatDateBE(d),point,casiers:A+B+C+D+F,A,B,C,D,E:0,F});});}return rows;}

    function findStop(id){return state.tour.stops.find(s=>s.id===id);}window.updateDocumentsDelivered=function(id,checked){const s=findStop(id);if(s){s.documentsDelivered=!!checked;save();render();}};window.updateVehicleFuel=function(id,checked){const s=findStop(id);if(s){s.vehicleFuelChecked=!!checked;save();render();}};window.updateStockChecked=function(id,checked){const s=findStop(id);if(s){s.stockChecked=!!checked;save();render();}};window.updateNote=function(id,value){const s=findStop(id);if(s){s.note=value;save();}};window.updateStepLevel=function(id,field,value){const s=findStop(id);if(s){s[field]=value;save();render();}};window.changePalette=function(id,k,delta){const s=findStop(id);if(!s)return;if(s.id==='asbl'&&!state.tour.started){state.tour.started=true;}s.collected=s.collected||emptyPalettes();s.collected[k]=Math.max(0,Number(s.collected[k]||0)+delta);if(delta>0)playValidatedSound();save();render();};window.openItinerary=function(id){const s=findStop(id);if(s)window.open(mapsLink(s),'_blank');};window.validateStop=function(id){const s=findStop(id);if(!s)return;if(!canValidateStep(s)){alert(missingValidationMessage(s));return;}s.status='done';s.validatedAt=new Date().toISOString();const idx=state.tour.stops.findIndex(x=>x.id===id);if(idx>-1){const [step]=state.tour.stops.splice(idx,1);state.tour.stops.push(step);}const next=state.tour.stops.find(x=>x.status!=='done');if(next)next.status='active';save();render();};window.unvalidateStop=function(id){const s=findStop(id);if(s){s.status='pending';s.validatedAt=null;save();render();}};window.toggleMainStop=function(id){mainExpandedStops[id]=!(mainExpandedStops[id]??false);render();};
    function stepLevelToNumber(value){if(value==='1/4')return .25;if(value==='1/2')return .5;if(value==='3/4')return .75;const n=Number(value);return Number.isFinite(n)?n:0;}function formatStepLevelTotal(v){const n=Number(v||0);return Number.isInteger(n)?String(n):String(Number(n.toFixed(2))).replace('.',',');}function displayDashZero(v){const n=stepLevelToNumber(v);return n===0?'-':formatStepLevelTotal(n);}function displayCount(v){const n=Number(v||0);return n===0?'-':String(n);}function reportSummaryTotals(stops){return stops.reduce((a,s)=>{a.green+=['A','B','C','D'].reduce((sum,k)=>sum+Number(s.collected?.[k]||0),0);a.blue+=Number(s.collected?.F||0);a.frozen+=stepLevelToNumber(s.frozenProductsLevel);a.other+=stepLevelToNumber(s.otherContainersLevel);return a;},{green:0,blue:0,frozen:0,other:0});}function forecastSummaryHtml(row){const normal=['A','B','C','D'].reduce((sum,k)=>sum+Number(row?.[k]||0),0),box97=Number(row?.F||0),frozen=row?.frozenProductsLevel!==undefined?stepLevelToNumber(row.frozenProductsLevel):null,other=row?.otherContainersLevel!==undefined?stepLevelToNumber(row.otherContainersLevel):null;return `<div class="forecast-summary-icons"><span class="forecast-summary-item"><b>${displayCount(normal)}</b><img src="${paletteImage('A')}"></span><span class="forecast-summary-item"><b>${displayCount(box97)}</b><img src="${paletteImage('F')}"></span>${frozen!==null?`<span class="forecast-summary-item"><b>${displayDashZero(frozen)}</b><img src="${paletteImage('E')}"></span>`:''}${other!==null?`<span class="forecast-summary-item"><b>${displayDashZero(other)}</b><img src="${OTHER_CONTAINER_IMAGE}"></span>`:''}</div>`;}
    function placeImage(p){return p?.image||'https://images.unsplash.com/photo-1593113598332-cd288d649433?q=80&w=1200&auto=format&fit=crop';}function renderPlaces(){ $('#placesBody').innerHTML=state.places.map(p=>`<div class="place-row" onclick="openPlaceDetail('${p.id}')"><strong>${p.id==='asbl'?'ASBL Rafaël':p.name}</strong><p>${p.type} · ${p.property}<br>${p.address}</p></div>`).join('');$('#placesModal').classList.add('open');}function editablePlaceField(labelKey,id,value){return placeDetailEditMode?`<div class="info-row"><small>${tr(labelKey)}</small><input id="${id}" value="${String(value||'').replace(/"/g,'&quot;')}"></div>`:`<div class="info-row"><small>${tr(labelKey)}</small><b>${value||tr('unavailable')}</b></div>`;}function renderPlaceDetailBody(id){const p=state.places.find(x=>x.id===id);if(!p)return;$('#placeDetailBody').innerHTML=`<div class="place-detail-hero" style="background-image:url('${placeImage(p)}')"><div class="place-detail-title"><b>${p.id==='asbl'?'ASBL Rafaël':p.name}</b><span>${p.property} · ${p.type}</span></div></div><div class="info-list">${placeDetailEditMode?`<input id="editPlaceName" type="hidden" value="${String(p.name||'').replace(/"/g,'&quot;')}"><input id="editPlaceType" type="hidden" value="${String(p.type||'').replace(/"/g,'&quot;')}"><input id="editPlaceProperty" type="hidden" value="${String(p.property||'').replace(/"/g,'&quot;')}">`:''}${editablePlaceField('address','editPlaceAddress',p.address)}${editablePlaceField('contact','editPlaceContact',p.contact)}${placeDetailEditMode?editablePlaceField('contactEmail','editPlaceEmail',p.email):`<div class="info-row"><small>${tr('contactEmail')}</small><div class="info-action-row"><b>${p.email||'info@ingwewewe'}</b><a class="info-icon-btn" href="mailto:${p.email||'info@ingwewewe'}">✉️</a></div></div>`}${placeDetailEditMode?editablePlaceField('phone','editPlacePhone',p.phone):`<div class="info-row"><small>${tr('phone')}</small><div class="info-action-row"><b>${p.phone||tr('unavailabl     function normalizeText(value){
      const raw=String(value||'').toLowerCase().normalize('NFD');
      let out='';
      for(const ch of raw){
        const code=ch.charCodeAt(0);
        const isAccent=code>=768&&code<=879;
        const isLetterOrNumber=(ch>='a'&&ch<='z')||(ch>='0'&&ch<='9');
        out+=isAccent?'':(isLetterOrNumber?ch:' ');
      }
      return out.split(' ').filter(Boolean).join(' ');
    }

    function levenshtein(a,b){
      a=normalizeText(a);b=normalizeText(b);
      if(a===b)return 0;
      if(!a.length)return b.length;
      if(!b.length)return a.length;
      const matrix=[];
      for(let i=0;i<=b.length;i++)matrix[i]=[i];
      for(let j=0;j<=a.length;j++)matrix[0][j]=j;
      for(let i=1;i<=b.length;i++){
        for(let j=1;j<=a.length;j++){
          matrix[i][j]=b.charAt(i-1)===a.charAt(j-1)
            ? matrix[i-1][j-1]
            : Math.min(matrix[i-1][j-1]+1, matrix[i][j-1]+1, matrix[i-1][j]+1);
        }
      }
      return matrix[b.length][a.length];
    }

    function fuzzyScore(query,target){
      const q=normalizeText(query),t=normalizeText(target);
      if(!q||!t)return 999;
      if(t.includes(q)||q.includes(t))return 0;
      const qWords=q.split(' ').filter(w=>w.length>1);
      const tWords=t.split(' ').filter(w=>w.length>1);
      let score=0;
      qWords.forEach(qw=>{
        const best=Math.min(...tWords.map(tw=>levenshtein(qw,tw)));
        score+=Number.isFinite(best)?best:6;
      });
      return score/Math.max(1,qWords.length);
    }

    function fuzzyFindMany(query,items,getText,limit=5,maxScore=2.2){
      return items.map(item=>({item,score:fuzzyScore(query,getText(item))}))
        .sort((a,b)=>a.score-b.score)
        .filter(x=>x.score<=maxScore)
        .slice(0,limit)
        .map(x=>x.item);
    }

    function getTodayVisitPoints(){
      return getPlacesForToday(state).map(p=>p.name+' — '+p.address);
    }

    function findPlacesByBrand(brand){
      const b=normalizeText(brand);
      return state.places.filter(p=>normalizeText(p.name).includes(b)||normalizeText(p.property).includes(b));
    }

    function findPlaceFromQuestion(question){
      const q=normalizeText(question);
      const sorted=[...state.places].sort((a,b)=>b.name.length-a.name.length);
      const exact=sorted.find(p=>{
        const name=normalizeText(p.name);
        const words=name.split(' ').filter(w=>w.length>2);
        return q.includes(name)||words.every(w=>q.includes(w));
      });
      if(exact)return exact;
      const fuzzy=fuzzyFindMany(question,state.places,p=>p.name+' '+p.property+' '+p.address,1,2.4);
      return fuzzy[0]||null;
    }

    function findSimilarPlaces(question,limit=3){
      return fuzzyFindMany(question,state.places,p=>p.name+' '+p.property+' '+p.address,limit,3.1);
    }

    function findStockItemsFromQuestion(question){
      const q=normalizeText(question);
      const rows=state.longTermStock||[];
      const direct=rows.filter(item=>{
        const product=normalizeText(item.product);
        const category=normalizeText(item.category);
        const words=product.split(' ').filter(w=>w.length>2);
        return q.includes(product)||product.includes(q)||q.includes(category)||words.some(w=>q.includes(w)||w.includes(q));
      });
      if(direct.length)return direct;
      return fuzzyFindMany(question,rows,item=>item.product+' '+item.category,10,2.3);
    }

    function relatedStockSuggestions(question,foundItems){
      const q=normalizeText(question);
      const rows=state.longTermStock||[];
      const categories=[...new Set((foundItems||[]).map(i=>i.category).filter(Boolean))];
      let suggestions=[];
      if(categories.length){
        suggestions=rows.filter(i=>categories.includes(i.category)&&!(foundItems||[]).some(f=>f.product===i.product));
      }
      if(!suggestions.length){
        suggestions=fuzzyFindMany(q,rows,item=>item.product+' '+item.category,5,3.2).filter(i=>!(foundItems||[]).some(f=>f.product===i.product));
      }
      return suggestions.slice(0,5);
    }

    function stockSummaryForItems(items,originalQuestion=''){
      if(!items.length){
        const suggestions=fuzzyFindMany(originalQuestion,state.longTermStock||[],item=>item.product+' '+item.category,5,4);
        if(suggestions.length){
          return 'Je n’ai pas trouvé exactement ce produit, mais voici ce qui ressemble à ta demande :<br>'+chatList(suggestions.map(item=>item.product+' : '+(item.quantity||'-')+' '+(item.unit||'pièces')+' — '+(item.category||'Non classé'))) + chatSuggest('“combien de '+suggestions[0].product+' en stock ?” ou “produits catégorie '+(suggestions[0].category||'...')+'”') + chatActionButtons([{label:'Ouvrir Stock',action:'chatOpenStock()'}]);
        }
        return 'Je n’ai pas trouvé ce produit dans le stock Banque Alimentaire Européenne.'+chatSuggest('Essaye avec un mot simple : riz, lait, huile, tomates, biscuits, dattes, conserves.')+chatActionButtons([{label:'Ouvrir Stock',action:'chatOpenStock()'}]);
      }
      const related=relatedStockSuggestions(originalQuestion,items);
      let reply=items.slice(0,10).map(item=>'• '+item.product+' : '+(item.quantity||'-')+' '+(item.unit||'pièces')+' — '+(item.category||'Non classé')+' — '+(item.zone||'emplacement non indiqué')).join('<br>');
      if(related.length){
        reply+='<br><br>Produits proches ou liés :<br>'+related.map(item=>'• '+item.product+' — '+(item.quantity||'-')+' '+(item.unit||'pièces')).join('<br>');
      }
      reply+=chatSuggest('Tu peux demander : “où est stocké ce produit ?”, “montre la catégorie '+(items[0].category||'...')+'”, ou “combien de '+items[0].product+' ?”');
      reply+=chatActionButtons([{label:'Ouvrir Stock',action:'chatOpenStock()'}]);
      return reply;
    }

    function globalStockSummary(){
      const rows=state.longTermStock||[];
      const categories={};
      rows.forEach(item=>{const cat=item.category||'Non classé';categories[cat]=(categories[cat]||0)+1;});
      return 'J’ai '+rows.length+' produits enregistrés dans Banque Alimentaire Européenne.<br>'+Object.entries(categories).map(([cat,count])=>'• '+cat+' : '+count+' produit(s)').join('<br>')+chatSuggest('Tu peux demander : “combien de riz ?”, “liste les conserves”, “produits proches de lait”, “où sont les dattes ?”')+chatActionButtons([{label:'Ouvrir Stock',action:'chatOpenStock()'}]);
    }

    function chatCapabilitiesText(){
      return 'Je suis l’assistant interne Rafaël. Je peux comprendre les questions simples et te répondre avec les données du code : tournée, lieux, contacts, stock, rapport et validations.<br><br>Exemples :<br>• Comment ça va ?<br>• Quelle heure est-il ?<br>• Quels sont les points de visite aujourd’hui ?<br>• Liste les Colruyt, Okey ou Aldi.<br>• Qui est le gérant de Banque Alimentaire Bruxelles-Brabant ?<br>• Combien de riz j’ai en stock ?<br>• Quels produits sont dans la catégorie Conserves ?';
    }

    function chatboxAutoReply(message){
      const raw=String(message||'').trim();
      const txt=normalizeText(raw);
      if(!txt) return 'Je suis là. Pose-moi une question sur la tournée, les lieux, les contacts, le stock ou le rapport.';

      if(['bonjour','salut','bonsoir','hello','salam','coucou'].some(w=>txt.includes(w))) return 'Bonjour 👋 Je suis là pour t’aider. Tu peux me poser une question sur la tournée, les magasins, les contacts, le stock ou le rapport.';
      if(txt.includes('comment ca va')||txt.includes('ca va')||txt.includes('comment vas tu')) return 'Ça va très bien, merci. Je suis prêt à t’aider sur la tournée et les données ASBL Rafaël.';
      if(txt.includes('qui es tu')||txt.includes('tu es qui')||txt.includes('ton role')||txt.includes('tes capacites')||txt.includes('que peux tu faire')) return chatCapabilitiesText()+chatActionButtons([{label:'Ouvrir Stock',action:'chatOpenStock()'},{label:'Ouvrir Lieux',action:'chatOpenPlaces()'},{label:'Ouvrir Rapport',action:'chatOpenReport()'}]);
      if(txt.includes('heure')) return 'Il est '+currentTimeBE()+'.';
      if(txt.includes('date')&&!txt.includes('stock')) return 'Aujourd’hui, nous sommes le '+new Date().toLocaleDateString('fr-BE')+' et il est '+currentTimeBE()+'.';

      if((txt.includes('point')||txt.includes('visite')||txt.includes('tournee'))&&(txt.includes('aujourd')||txt.includes('jour'))) return 'Voici les points de visite prévus aujourd’hui :<br>'+chatList(getTodayVisitPoints())+chatSuggest('Tu peux demander : “qui est le contact de Colruyt Jette ?”, “adresse Aldi Marius Renard”, “liste les Aldi”.')+chatActionButtons([{label:'Ouvrir Lieux',action:'chatOpenPlaces()'},{label:'Ouvrir Rapport',action:'chatOpenReport()'}]);
      if(txt.includes('colruyt')) return 'Voici les magasins Colruyt dans la liste :<br>'+chatList(findPlacesByBrand('colruyt').map(p=>p.name+' — '+p.address))+chatSuggest('Tu peux demander : “contact Colruyt Laeken”, “adresse Colruyt Jette”, “gérant Colruyt Osseghem”.')+chatActionButtons([{label:'Ouvrir Lieux',action:'chatOpenPlaces()'}]);
      if(txt.includes('okey')||txt.includes('okay')){
        const places=findPlacesByBrand('okey').concat(findPlacesByBrand('okay')).filter((p,i,arr)=>arr.findIndex(x=>x.id===p.id)===i);
        return 'Voici les magasins Okey / Okay dans la liste :<br>'+chatList(places.map(p=>p.name+' — '+p.address))+chatSuggest('Tu peux demander : “contact Okay Jette” ou “adresse Okay Ganshoren”.')+chatActionButtons([{label:'Ouvrir Lieux',action:'chatOpenPlaces()'}]);
      }
      if(txt.includes('aldi')) return 'Voici les magasins Aldi dans la liste :<br>'+chatList(findPlacesByBrand('aldi').map(p=>p.name+' — '+p.address))+chatSuggest('Tu peux demander : “contact Aldi Saint-Guidon”, “adresse Aldi Chaussée de Mons”.')+chatActionButtons([{label:'Ouvrir Lieux',action:'chatOpenPlaces()'}]);
      if(txt.includes('banque alimentaire')){
        const places=findPlacesByBrand('banque alimentaire');
        return 'Voici les points Banque Alimentaire dans la liste :<br>'+chatList(places.map(p=>p.name+' — '+p.address+'<br>Contact : '+(p.contact||'non indiqué')+' · '+(p.phone||'téléphone non indiqué')+' · '+(p.email||'email non indiqué')));
      }

      if(txt.includes('gerant')||txt.includes('responsable')||txt.includes('contact')||txt.includes('telephone')||txt.includes('email')){
        const place=findPlaceFromQuestion(raw);
        if(place) return place.name+'<br>Adresse : '+place.address+'<br>Contact : '+(place.contact||'non indiqué')+'<br>Téléphone : '+(place.phone||'non indiqué')+'<br>Email : '+(place.email||'non indiqué')+chatSuggest('Tu peux aussi demander : “adresse '+place.name+'”, “téléphone '+place.name+'”, “liste les magasins de cette enseigne”.')+chatActionButtons([{label:'Ouvrir Lieux',action:'chatOpenPlaces()'}]);
        const suggestions=findSimilarPlaces(raw,3);
        if(suggestions.length)return 'Je n’ai pas trouvé exactement le magasin, mais tu voulais peut-être dire :<br>'+chatList(suggestions.map(p=>p.name+' — '+p.address+'<br>Contact : '+(p.contact||'non indiqué')))+chatActionButtons([{label:'Ouvrir Lieux',action:'chatOpenPlaces()'}]);
        return 'Dis-moi le nom du magasin ou du partenaire, et je te donne son contact, téléphone, email et adresse.';
      }

      if(txt.includes('adresse')){
        const place=findPlaceFromQuestion(raw);
        if(place) return place.name+'<br>Adresse : '+place.address+chatActionButtons([{label:'Ouvrir Lieux',action:'chatOpenPlaces()'}]);
        const suggestions=findSimilarPlaces(raw,3);
        if(suggestions.length)return 'Je n’ai pas trouvé exactement ce lieu, mais voici les lieux proches de ta demande :<br>'+chatList(suggestions.map(p=>p.name+' — '+p.address));
        return 'Je peux te donner une adresse. Écris par exemple : adresse Colruyt Jette.';
      }

      if(txt.includes('combien')&&txt.includes('stock')) return stockSummaryForItems(findStockItemsFromQuestion(raw),raw);
      if(txt.includes('stock')){
        const items=findStockItemsFromQuestion(raw);
        return items.length?stockSummaryForItems(items,raw):globalStockSummary();
      }

      if(txt.includes('categorie')||txt.includes('category')){
        const categories=[...new Set((state.longTermStock||[]).map(i=>i.category||'Non classé'))];
        const matched=categories.find(cat=>txt.includes(normalizeText(cat)));
        if(matched){
          const rows=(state.longTermStock||[]).filter(i=>(i.category||'Non classé')===matched);
          return 'Produits dans la catégorie '+matched+' :<br>'+chatList(rows.map(i=>i.product+' — '+(i.quantity||'-')+' '+(i.unit||'pièces')+' — '+(i.zone||'emplacement non indiqué')))+chatSuggest('Tu peux demander : “combien de '+(rows[0]?.product||'ce produit')+' ?” ou “où est stocké '+(rows[0]?.product||'ce produit')+' ?”')+chatActionButtons([{label:'Ouvrir Stock',action:'chatOpenStock()'}]);
        }
        return 'Catégories disponibles :<br>'+chatList(categories)+chatActionButtons([{label:'Ouvrir Stock',action:'chatOpenStock()'}]);
      }

      if(txt.includes('rapport')) return 'Tu peux ouvrir le rapport avec l’icône 📊. Il reprend les partenaires, les bacs, les notes, les produits surgelés, les autres contenants et peut être envoyé par email.'+chatActionButtons([{label:'Ouvrir Rapport',action:'chatOpenReport()'}]);
      if(txt.includes('lieu')||txt.includes('magasin')||txt.includes('partenaire')) return 'Voici les lieux actuellement enregistrés :<br>'+chatList(state.places.map(p=>p.name+' — '+p.property+' — '+p.address))+chatSuggest('Tu peux demander : “liste les Aldi”, “contact Banque Alimentaire”, “adresse Colruyt Jette”.')+chatActionButtons([{label:'Ouvrir Lieux',action:'chatOpenPlaces()'}]);
      if(txt.includes('valider')) return 'Pour valider une étape, il faut compléter les confirmations obligatoires. Si une validation est bloquée, le système indique ce qu’il manque. La note reste facultative.';

      return 'Je comprends ta demande. Je peux surtout répondre sur les données internes de l’app : tournée du jour, magasins, contacts, stocks, catégories, quantités, rapport et validation. Reformule avec un nom de magasin, un produit ou une catégorie, et je te donne les détails.';
    }
    window.sendChatboxMessage=function(){
      const input=$('#chatboxInput');
      const body=$('#chatboxBody');
      const msg=input?.value?.trim();
      if(!msg||!body)return;
      body.insertAdjacentHTML('beforeend',`<div class="chat-message user">${msg.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`);
      input.value='';
      const reply=chatboxAutoReply(msg);
      setTimeout(()=>{body.insertAdjacentHTML('beforeend',`<div class="chat-message bot">${reply}</div>`);scrollChatToBottom();},180);
      scrollChatToBottom();
    }
    document.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click',()=>{$('#'+b.dataset.close)?.classList.remove('open');}));$('#openReport').addEventListener('click',()=>{renderReport();$('#reportModal').classList.add('open');});$('#openPlaces').addEventListener('click',renderPlaces);$('#openChatbox').addEventListener('click',()=>{$('#chatboxModal').classList.add('open');setTimeout(()=>{$('#chatboxInput')?.focus();scrollChatToBottom();},80);});$('#chatboxInput')?.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChatboxMessage();}});const settingsBtn=$('#openWeeklySettings');
    settingsBtn.addEventListener('click',()=>{
      renderWeeklySettings();
      $('#weeklyModal').classList.add('open');
    });

      console.assert(typeof openLongStockDetail==='function','openLongStockDetail must be defined');
      console.assert(typeof saveLongStockDetail==='function','saveLongStockDetail must be defined');
      console.assert(typeof sendChatboxMessage==='function','sendChatboxMessage must be defined');
      console.assert(defaultData.longTermStock.length>=50,'default long stock should include at least 50 products');
      console.assert(Array.isArray(state.tour.stops),'tour stops should exist');
      console.assert(state.tour.stops.some(s=>s.id==='asbl'),'ASBL step should exist');
    }
    applyScreenIntensity();runSmokeTests();render();
