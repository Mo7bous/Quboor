    <script>
        const arabicLetters = 'ابتثجحخدذرزسشصضطظعغفقكلمنهوي';

        function createParticle() {
            const particle = document.createElement('span');
            particle.classList.add('particle');
            
            const letter = arabicLetters[Math.floor(Math.random() * arabicLetters.length)];
            particle.textContent = letter;
            
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = Math.random() * 100 + 'vh';
            
            const hue = Math.random() * 60 + 180; // Blue to purple hues
            particle.style.color = `hsl(${hue}, 100%, 75%)`;
            
            particle.style.animationDuration = Math.random() * 10 + 5 + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';

            document.querySelector('.particles').appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, 20000);
        }

        setInterval(createParticle, 200);
    </script>
