            function toggleNav() {
                const sidebar = document.getElementById("mySidebar");
                sidebar.style.left = (sidebar.style.left === "0px") ? "-280px" : "0px";
            }
    
            // Map Initialization
            var map = L.map('map').setView([33.5731, -7.5898], 6);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
            
            // Modal Logic
            const modal = document.getElementById("addNewEntryModal");
            const openModalButton = document.getElementById("openAddModal");
            const closeModalButton = document.getElementById("closeModal");
    
            openModalButton.onclick = function() {
                modal.style.display = "block";
            }
    
            closeModalButton.onclick = function() {
                modal.style.display = "none";
            }
    
            window.onclick = function(event) {
                if (event.target == modal) {
                    modal.style.display = "none";
                }
            }
    
            function highlightText(text, searchTerms) {
                if (!searchTerms.length) return text;
                const regex = new RegExp(`(${searchTerms.join('|')})`, 'gi');
                return text.replace(regex, '<mark>$1</mark>');
            }
    
            function calculateMatchCount(entry, searchTerms) {
                let matchCount = 0;
                const entryFields = [
                    entry.familyName,
                    entry.firstName,
                    entry.dob.split('-')[0], // Year of birth
                    entry.dod.split('-')[0], // Year of death
                    entry.birthplace,
                    entry.description,
                    entry.cemetery,
                    entry.profession
                ];
    
                searchTerms.forEach(term => {
                    entryFields.forEach((field, index) => {
                        if (typeof field === 'string' && field.toLowerCase().includes(term.toLowerCase())) {
                            if (index < 5) {
                                matchCount++;
                            } else {
                                matchCount = Math.min(matchCount + 1, 5);
                            }
                        }
                    });
                });
    
                return matchCount;
            }
    
            function createCard(entry, index, searchTerms, matchPercentage) {
                const card = document.createElement("div");
                card.className = "death-card";
                card.innerHTML = `

                        <button class="delete-btn" onclick="confirmDelete(${index}, event)"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="death-card-info">
                        <img src="file:///C:/Users/Public/1408/Images/DataBase/${entry.image.split('\\').pop()}" alt="${entry.familyName} ${entry.firstName}" class="death-card-image">
                        <div class="death-card-details">
                            <h3>${highlightText(entry.familyName + ' ' + entry.firstName, searchTerms)}</h3>
                            <div class="info-items">
                                <div class="info-item"><i class="fas fa-birthday-cake"></i><p>${highlightText(entry.dob.split('-')[0], searchTerms)}</p></div>
                                <div class="info-item"><i class="fas fa-cross"></i><p>${highlightText(entry.dod.split('-')[0], searchTerms)}</p></div>
                            </div>
                            <div class="info-item"><i class="fas fa-briefcase"></i><p>${highlightText(entry.profession, searchTerms)}</p></div>
                            <div class="info-item"><i class="fas fa-info-circle"></i><p>${highlightText(entry.description, searchTerms)}</p></div>
                        </div>
                    </div>
                    ${matchPercentage >= 5 ? `<div class="match-percentage">${matchPercentage.toFixed(1)}%</div>` : ''}
                `;
                return card;
            }
    
            function confirmDelete(index, event) {
                event.stopPropagation();
                const entry = deathEntries[index];
                const confirmContent = `
                    <div class="confirm-delete">
                        <h3>Confirmation</h3>
                        <p>Êtes-vous sûr de vouloir supprimer l'entrée pour ${entry.familyName} ${entry.firstName}?</p>
                        <div class="confirm-actions">
                            <button onclick="deleteEntry(${index})">Oui, Effacer</button>
                            <button onclick="closePopup()">Annuler</button>
                        </div>
                    </div>
                `;
                document.getElementById('profileContent').innerHTML = confirmContent;
                document.getElementById('profilePopup').style.display = 'block';
            }
    
            function deleteEntry(index) {
                deathEntries.splice(index, 1);
                filterCards();
                closePopup();
            }
    
            function filterCards() {
                const searchInput = document.getElementById('searchInput').value.toLowerCase();
                const searchTerms = searchInput.split(' ').filter(term => term.trim() !== '');
                const container = document.getElementById("death-cards-container");
                container.innerHTML = "";
    
                const flatDeathEntries = deathEntries.flat();
                const entriesToShow = flatDeathEntries.concat(favoriteEntries);
    
                // Sort results by highest percentage rate
                entriesToShow.sort((a, b) => {
                    const matchCountA = calculateMatchCount(a, searchTerms);
                    const matchCountB = calculateMatchCount(b, searchTerms);
                    return matchCountB - matchCountA;
                });
    
                entriesToShow.forEach((entry, index) => {
                    const matchCount = calculateMatchCount(entry, searchTerms);
                    const matchPercentage = Math.min((matchCount / 5) * 99, 99);
    
                    const card = createCard(entry, index, searchTerms, matchPercentage);
                    container.appendChild(card);
    
                    const [lat, lng] = entry.location.split(',').map(coord => parseFloat(coord.trim()));
                    if (!markers[index]) {
                        markers[index] = L.marker([lat, lng]).addTo(map);
                    }
    
                    card.addEventListener('click', () => showLocationOnMap(entry, index));
                });
            }
    
            document.getElementById("getLocation").addEventListener('click', function() {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(function(position) {
                        const latitude = position.coords.latitude;
                        const longitude = position.coords.longitude;
                        document.getElementById("location").value = `${latitude}, ${longitude}`;
                    });
                } else {
                    alert("Geolocation is not supported by this browser.");
                }
            });
    
            document.getElementById("addEntryForm").onsubmit = function(e) {
                e.preventDefault();
                const formData = new FormData(this);
                const newEntry = Object.fromEntries(formData.entries());
    
                const fileInput = document.getElementById('image');
                if (fileInput.files && fileInput.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        newEntry.image = e.target.result;
                        deathEntries.push(newEntry);
                        filterCards();
                        modal.style.display = "none";
                        this.reset();
                    };
                    reader.readAsDataURL(fileInput.files[0]);
                } else {
                    newEntry.image = "C:\\Users\\Public\\1408\\Images\\DataBase\\default.jpg";
                    deathEntries.push(newEntry);
                    filterCards();
                    modal.style.display = "none";
                    this.reset();
                }
            };
    
            function showInfo(index, event) {
                event.stopPropagation();
                const entry = deathEntries[index];
                const profileContent = document.getElementById('profileContent');
                profileContent.innerHTML = `
                    <div class="profile-header">
                        <img src="file:///C:/Users/Public/1408/Images/DataBase/${entry.image.split('\\').pop()}" alt="${entry.familyName} ${entry.firstName}" class="profile-image">
                        <h2>${entry.familyName} ${entry.firstName}</h2>
                    </div>
                    <div class="profile-details">
                        <div class="profile-item">
                            <i class="fas fa-birthday-cake"></i>
                            <span><strong>Date of Birth:</strong> ${entry.dob}</span>
                        </div>
                        <div class="profile-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <span><strong>Birthplace:</strong> ${entry.birthplace}</span>
                        </div>
                        <div class="profile-item">
                            <i class="fas fa-cross"></i>
                            <span><strong>Date of Death:</strong> ${entry.dod}</span>
                        </div>
                        <div class="profile-item">
                            <i class="fas fa-map-pin"></i>
                            <span><strong>Location:</strong> ${entry.location}</span>
                        </div>
                        <div class="profile-item">
                            <i class="fas fa-info-circle"></i>
                            <span><strong>Description:</strong> ${entry.description}</span>
                        </div>
                        <div class="profile-item">
                            <i class="fas fa-grav"></i>
                            <span><strong>Cemetery:</strong> ${entry.cemetery}</span>
                        </div>
                        <div class="profile-item">
                            <i class="fas fa-briefcase"></i>
                            <span><strong>Profession:</strong> ${entry.profession}</span>
                        </div>
                    </div>
                `;
                document.getElementById('profilePopup').style.display = 'block';
            }
    
            function editEntry(index, event) {
                event.stopPropagation();
                const entry = deathEntries[index];
                const profileContent = document.getElementById('profileContent');
                profileContent.innerHTML = `
                    <div class="profile-header">
                        <img src="file:///C:/Users/Public/1408/Images/DataBase/${entry.image.split('\\').pop()}" alt="${entry.familyName} ${entry.firstName}" class="profile-image" id="previewImage">
                        <input type="file" id="imageUpload" name="image" accept="image/*" style="display: none;">
                        <label for="imageUpload" class="upload-btn">Télécharger une photo</label>
                    </div>
                    <form id="editEntryForm" class="profile-details">
                        <div class="profile-item">
                            <i class="fas fa-user"></i>
                            <input type="text" id="editFamilyName" name="familyName" value="${entry.familyName}" required>
                        </div>
                        <div class="profile-item">
                            <i class="fas fa-user"></i>
                            <input type="text" id="editFirstName" name="firstName" value="${entry.firstName}" required>
                        </div>
                        <div class="profile-item">
                            <i class="fas fa-birthday-cake"></i>
                            <input type="date" id="editDob" name="dob" value="${entry.dob}" required>
                        </div>
                        <div class="profile-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <select id="editBirthplace" name="birthplace" required>
                                <option value="Casablanca" ${entry.birthplace === 'Casablanca' ? 'selected' : ''}>Casablanca</option>
                                <option value="Rabat" ${entry.birthplace === 'Rabat' ? 'selected' : ''}>Rabat</option>
                                <option value="Marrakech" ${entry.birthplace === 'Marrakech' ? 'selected' : ''}>Marrakech</option>
                                <option value="Fes" ${entry.birthplace === 'Fes' ? 'selected' : ''}>Fes</option>
                                <option value="Tangier" ${entry.birthplace === 'Tangier' ? 'selected' : ''}>Tangier</option>
                            </select>
                        </div>
                        <div class="profile-item">
                            <i class="fas fa-cross"></i>
                            <input type="date" id="editDod" name="dod" value="${entry.dod}" required>
                        </div>
                        <div class="profile-item">
                            <i class="fas fa-map-pin"></i>
                            <input type="text" id="editLocation" name="location" value="${entry.location}" readonly>
                        </div>
                        <p class="location-note">La localisation ne peut pas être modifiée à distance. Veuillez effacer le profil et en créer un nouveau lors de votre prochaine visite.</p>
                        <div class="profile-item">
                            <i class="fas fa-info-circle"></i>
                            <textarea id="editDescription" name="description" rows="3">${entry.description}</textarea>
                        </div>
                        <div class="profile-item">
                            <i class="fas fa-grav"></i>
                            <input type="text" id="editCemetery" name="cemetery" value="${entry.cemetery}">
                        </div>
                        <div class="profile-item">
                            <i class="fas fa-briefcase"></i>
                            <input type="text" id="editProfession" name="profession" value="${entry.profession}">
                        </div>
                        <button type="submit" class="save-button">Sauvegarder</button>
                    </form>
                `;
                document.getElementById('profilePopup').style.display = 'block';
                
                // Image upload preview
                document.getElementById('imageUpload').addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            document.getElementById('previewImage').src = e.target.result;
                        }
                        reader.readAsDataURL(file);
                    }
                });
    
                document.getElementById('editEntryForm').onsubmit = function(e) {
                    e.preventDefault();
                    const formData = new FormData(this);
                    const updatedEntry = Object.fromEntries(formData.entries());
                    
                    const imageFile = document.getElementById('imageUpload').files[0];
                    if (imageFile) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            updatedEntry.image = e.target.result;
                            Object.assign(deathEntries[index], updatedEntry);
                            filterCards();
                            closePopup();
                        };
                        reader.readAsDataURL(imageFile);
                    } else {
                        Object.assign(deathEntries[index], updatedEntry);
                        filterCards();
                        closePopup();
                    }
                };
            }
    
            function closePopup() {
                document.getElementById('profilePopup').style.display = 'none';
            }
    
            function showLocationOnMap(entry, index) {
                const [lat, lng] = entry.location.split(',').map(coord => parseFloat(coord.trim()));
                map.setView([lat, lng], 15);
                
                markers[index].bindPopup(`
                    <div style="text-align: center;">
                        <img src="file:///C:/Users/Public/1408/Images/DataBase/${entry.image.split('\\').pop()}" alt="${entry.familyName} ${entry.firstName}" style="width: 100px; height: 100px; border-radius: 50%; margin-bottom: 10px;">
                        <h3 style="margin: 0 0 10px 0;">${entry.familyName} ${entry.firstName}</h3>
                        <button onclick="openDirections(${lat}, ${lng})" style="background-color: #4CAF50; border: none; color: white; padding: 10px 20px; text-align: center; text-decoration: none; display: inline-block; font-size: 16px; margin: 4px 2px; cursor: pointer; border-radius: 5px;">
                            <i class="fas fa-directions" style="margin-right: 5px;"></i> Navigate
                        </button>
                    </div>
                `).openPopup();
            }
    
            function openDirections(lat, lng) {
                const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
                window.open(url, '_blank');
            }
    
            // Initial card creation
            filterCards();
    
            // Add event listener for search
            document.getElementById('searchInput').addEventListener('input', filterCards);
    
            // Add scroll event for "+" button opacity
            window.addEventListener('scroll', function() {
                const addButton = document.querySelector('.add-new');
                const scrollPosition = window.scrollY;
                const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                const fadeStart = 100;
                const fadeEnd = maxScroll / 2;
    
                if (scrollPosition > fadeStart) {
                    const opacity = 1 - Math.min((scrollPosition - fadeStart) / (fadeEnd - fadeStart), 1);
                    addButton.style.opacity = opacity;
                } else {
                    addButton.style.opacity = 1;
                }
            });
        </script>
    </body>
    </html>
